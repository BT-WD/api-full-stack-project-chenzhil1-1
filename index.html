<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Suggestion App Login</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- You code goes here-->
    <main class="page-shell">
      <section class="login-card" aria-labelledby="greeting-title" hidden>
        <header class="greeting-block">
          <h1 id="greeting-title">Welcome,</h1>
          <p id="service-line">Now Serving</p>
        </header>

        <p class="login-prompt">Please log in</p>

        <form class="login-form" action="#" method="post">
          <label for="username">Username or Email</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Enter your username or email"
            autocomplete="username"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />

          <button type="submit" class="btn btn-primary">Sign In</button>
          <button type="button" class="btn btn-secondary" id="go-to-create-account">
            Create a New Account
          </button>
        </form>

        <p id="login-error" class="form-error" role="alert" aria-live="assertive" hidden></p>

        <footer class="site-footer">@chenoranges 2026</footer>
      </section>

      <section class="create-account-card" id="create-account-card" aria-labelledby="create-title" hidden>
        <header class="greeting-block">
          <h1 id="create-title">Welcome</h1>
        </header>

        <p class="login-prompt">Create your account</p>

        <form class="create-account-form" id="create-account-form" action="#" method="post">
          <label for="first-name">First Name</label>
          <input id="first-name" name="firstName" type="text" autocomplete="given-name" required />

          <label for="last-name">Last Name</label>
          <input id="last-name" name="lastName" type="text" autocomplete="family-name" required />

          <label for="create-email">Email</label>
          <input id="create-email" name="email" type="email" autocomplete="email" required />

          <label for="create-username">Username</label>
          <input id="create-username" name="username" type="text" autocomplete="username" required />

          <label for="create-password">Password</label>
          <input
            id="create-password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
          />

          <label for="gender">Gender (M/F/N)</label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>Select one</option>
            <option value="M">M</option>
            <option value="F">F</option>
            <option value="N">N</option>
          </select>

          <label for="age">Age</label>
          <input id="age" name="age" type="number" min="1" max="120" required />

          <label for="country">Country</label>
          <select id="country" name="country" required>
            <option value="" disabled selected>Select Your Region</option>
            <option value="United States">United States</option>
            <option value="Canada">Canada</option>
            <option value="United Kingdom">United Kingdom</option>
            <option value="Germany">Germany</option>
            <option value="France">France</option>
            <option value="Japan">Japan</option>
            <option value="South Korea">South Korea</option>
            <option value="Singapore">Singapore</option>
            <option value="Australia">Australia</option>
            <option value="New Zealand">New Zealand</option>
          </select>

          <button type="submit" class="btn btn-primary">Join Now</button>
          <button type="button" class="btn btn-secondary" id="back-to-login">
            Already Have an Account?
          </button>
        </form>

        <footer class="site-footer">@chenoranges 2026</footer>
      </section>

      <section class="app-view" id="app-view" aria-labelledby="user-greeting" hidden>
        <p class="current-time" id="current-time" aria-live="polite">--:--:--</p>
        <p class="user-greeting" id="user-greeting">Good morning</p>
        <p class="user-name" id="user-name">John</p>

        <div class="action-grid" role="group" aria-label="Main actions">
          <button type="button" class="btn app-btn" id="random-button">🔀 Something random</button>
          <button type="button" class="btn app-btn" id="likes-button">❤️Likes</button>
          <button type="button" class="btn app-btn" id="history-button">History</button>
        </div>

        <section class="food-panel" id="food-panel" aria-live="polite" hidden>
          <div class="food-panel-head">
            <h2 class="food-panel-title" id="food-panel-title">Result</h2>
            <button type="button" class="btn btn-secondary" id="food-panel-close" aria-label="Close panel">
              ×
            </button>
          </div>
          <p class="food-panel-content" id="food-panel-content">No selection yet.</p>
          <button
            type="button"
            class="btn btn-primary"
            id="food-like-toggle"
            aria-pressed="false"
            hidden
          >
            ♡ Save to likes
          </button>
        </section>

        <button type="button" class="logout-btn" id="logout-button">Logout</button>

        <footer class="site-footer">@chenoranges 2026</footer>
      </section>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
